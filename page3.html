<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanko❤️</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
            color: white;
            font-family: Arial, sans-serif;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
        }
        .message {
            z-index: 1;
            text-align: center;
        }
        .message h1, .message h2 {
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="message">
        <h1>apun ko dil say acha lga tum logo nay mera birthday celebrate kia</h1>
        <h1>us k liay thanko❤️❤️</h1>
    </div>
    <canvas id="confettiCanvas"></canvas>
    <script>
        const canvas = document.getElementById('confettiCanvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const confetti = [];
        const colors = ['#ff0000', '#ff7f00', '#ffff00', '#00ff00', '#0000ff', '#4b0082', '#8b00ff', '#ff69b4', '#00ffff'];

        function createConfetti() {
            for (let i = 0; i < 100; i++) {
                confetti.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    size: Math.random() * 5 + 5,
                    speed: Math.random() * 3 + 1
                });
            }
        }

        function updateConfetti() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            confetti.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, 2 * Math.PI);
                ctx.fillStyle = p.color;
                ctx.fill();
                p.y += p.speed;
                if (p.y > canvas.height) {
                    p.y = 0;
                }
            });

            requestAnimationFrame(updateConfetti);
        }

        createConfetti();
        updateConfetti();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
